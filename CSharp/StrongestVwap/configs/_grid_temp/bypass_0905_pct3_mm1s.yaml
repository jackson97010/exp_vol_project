strategy:
  market_rally_disable_threshold: 0.2
  market_open_min_chg: 0.0

signal_a:
  signal_a_enabled: false

strong_group:
  strong_group_enabled: true
  member_min_month_trading_val: 300000000
  group_min_month_trading_val: 3000000000
  group_min_avg_pct_chg: -999
  group_min_val_ratio: 0.0
  is_weighted_avg: false
  group_valid_top_n: 5
  top_group_rank_threshold: 5
  top_group_max_select: 3
  normal_group_max_select: 2
  entry_min_vwap_pct_chg: 0.0
  require_raw_m1: false
  member_cond1_enabled: false
  member_cond2_enabled: false
  member_cond4_enabled: false
  exclude_prev_limit_up_from_rank: false
  exclude_disposition_from_rank: true
  mode_e_enabled: true
  mode_e_large_group_threshold: 5
  mode_e_large_group_select: 3
  mode_e_small_group_select: 2
  mode_e_limit_up_cascade: true
  mode_e_max_limit_up_skip: 5

order:
  position_cash: 10000000
  disposition_stocks_enabled: false
  filter_prev_day_limit_up: false
  max_entry_price: 1000
  entry_time_limit: "13:00:00"
  mode_e_exit: true
  stop_loss_enabled: true
  stop_loss_pct: 1.2
  bailout_enabled: false
  exit_time_limit: "13:00:00"
  mode_e_tp_base: "entry_price"
  take_profit_splits: 4
  take_profit_pcts: [0.008, 0.016, 0.024]
  take_profit_ratios: [0.25, 0.25, 0.25]
  reserve_limit_up_splits: 1
  reserve_limit_up_ratio: 0.25
  entry_start_time: "09:09:00"
  entry_end_time: "13:00:00"
  group_rank_exit_enabled: false
  require_ask_gt_bid: true
  # Massive matching + quality filters
  massive_matching_enabled: true
  massive_matching_window: 1
  use_dynamic_liquidity_threshold: true
  # Interval pct filter (5min < 3%)
  interval_pct_filter_enabled: true
  interval_pct_minutes: 5
  interval_pct_threshold: 3.0
  # Ratio filter
  ratio_entry_enabled: true
  ratio_entry_threshold: 3.0
  ratio_column: "ratio_15s_300s"
  # Ask/Bid ratio
  ask_bid_ratio_threshold: 1.0
  # Price change limit
  price_change_limit_enabled: true
  price_change_limit_pct: 8.5

exit:
  trailing_low_enabled: true
  trailing_low_require_tp_fill: false

# Grid overrides
  bypass_group_screening: true
  entry_start_time: "09:05:00"
  interval_pct_threshold: 3.0
  adaptive_mm_window_enabled: false
  adaptive_mm_window_threshold: 10000000
  adaptive_mm_window_seconds: 2
